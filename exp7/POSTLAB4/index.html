<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Stats Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <div class="dashboard-container">
        <header>
            <h1>User Growth Analytics</h1>
            <p>Select a date range to update statistics</p>
        </header>

        <div class="filter-bar">
            <div class="input-field">
                <label>Start Date</label>
                <input type="date" id="startDate" value="2026-04-01">
            </div>
            <div class="input-field">
                <label>End Date</label>
                <input type="date" id="endDate" value="2026-04-07">
            </div>
            <button id="updateBtn">Update Dashboard</button>
        </div>

        <div class="chart-container">
            <canvas id="statsChart"></canvas>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
